<!DOCTYPE html>
<html>
<head>
<link href="https://fonts.googleapis.com/css2?family=Anton&display=swap" rel="stylesheet">
<style>
body{font-family:'Anton';text-align:center;background:#f5f5f5;}
table{width:90%;margin:auto;border-collapse:collapse;}
th{background:#9b59b6;color:white;padding:10px;}
td{background:white;padding:10px;}
</style>
</head>
<body>

<img src="https://i.imgur.com/WBaoUWQ.png" width="150">
<h2>Leaderboard</h2>

<table id="tablaDatos">
<tr>
<th>Rank</th>
<th>Player</th>
<th>Country</th>
<th>Team</th>
</tr>
</table>

<script>
const sheetID = "1G1O5Exi5x3G0UNjhN2nvZO-ON3gn9JsalZLdyj9oNMI";
const url = `https://opensheet.elk.sh/${sheetID}/Form Responses 1`;

fetch(url)
.then(res=>res.json())
.then(data=>{
  const tabla=document.getElementById("tablaDatos");

  data.forEach((p,i)=>{
    let fila=document.createElement("tr");

    fila.innerHTML=`
      <td>${i+1}</td>
      <td><img src="https://mc-heads.net/avatar/${p["Nick Minecraft"]}/25"> ${p["Nick Minecraft"]}</td>
      <td>${p["País"]}</td>
      <td>${p["Team"]||"-"}</td>
    `;

    tabla.appendChild(fila);
  });
});
</script>

<br>
<a href="index.html">Volver</a>

</body>
</html>
